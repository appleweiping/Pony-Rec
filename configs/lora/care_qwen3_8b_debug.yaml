# CARE-LoRA debug pilot (amazon_beauty, 20 users, Qwen3-8B local, not a paper run).
# Consumes JSONL from: outputs/pilots/care_lora_qwen3_8b_beauty_20u_c19_seed42_debug/data/
# Run orchestration: python -m src.cli.run_care_lora_debug (CLI args override these notes).

run_name: care_lora_qwen3_8b_beauty_debug
domain: amazon_beauty
seed: 42
candidate_size: 19

paths:
  # domain also accepted at top-level `domain:` (mirrored for clarity)
  output_root: outputs/pilots/care_lora_qwen3_8b_beauty_20u_c19_seed42_debug
  reprocess_dir: outputs/reprocessed_processed_source
  processed_dir: data/processed/amazon_beauty
  deepseek_pilot_root: outputs/pilots/deepseek_v4_flash_processed_20u_c19_seed42
  care_rerank_config: configs/methods/care_rerank_pilot.yaml
  base_model: /home/ajifang/models/Qwen/Qwen3-8B

training:
  max_train_steps: 12
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lora_r: 8
  lora_alpha: 16
  max_seq_length: 512
  topk: 19
  prompt_id: listwise_ranking_v1

inference:
  max_new_tokens: 384
  splits:
    - valid
    - test

flags:
  run_type: pilot
  backend_type: lora
  is_paper_result: false
