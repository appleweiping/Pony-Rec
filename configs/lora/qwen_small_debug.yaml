run_type: pilot
dataset: amazon_beauty
domain: Beauty
processed_dir: data/processed/amazon_beauty
base_model: Qwen/Qwen2.5-0.5B-Instruct
qlora: false
trust_remote_code: true
device_map: auto
train_path: data/processed/amazon_beauty/train_candidates.jsonl
valid_path: data/processed/amazon_beauty/valid_candidates.jsonl
adapter_output_dir: outputs/lora/qwen_small_debug_adapter
eval_output_dir: outputs/lora/qwen_small_debug_eval
data_mode: standard_sft
max_seq_length: 1024
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 0.0002
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules: [q_proj, k_proj, v_proj, o_proj]
