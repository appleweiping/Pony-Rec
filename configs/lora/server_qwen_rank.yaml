base_model: Qwen/Qwen2.5-7B-Instruct
qlora: true
trust_remote_code: true
device_map: auto
train_path: data/processed/amazon_beauty/train_candidates.jsonl
valid_path: data/processed/amazon_beauty/valid_candidates.jsonl
adapter_output_dir: outputs/lora/qwen_rank_uncertainty
max_seq_length: 2048
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 0.0002
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
