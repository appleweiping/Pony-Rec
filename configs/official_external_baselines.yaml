protocol_name: week8_official_external_same_candidate_qwen3base
status: implementation_contract
output_score_schema:
  - source_event_id
  - user_id
  - item_id
  - score
score_file_contract:
  key_columns:
    - source_event_id
    - user_id
    - item_id
  score_column: score
  required_key_set: exact_match_to_candidate_rows
  duplicate_keys_allowed: false
  missing_candidate_scores_allowed_in_primary_table: false
  extra_score_keys_allowed_in_primary_table: false
  score_value_rule: finite_numeric
  score_scale_rule: arbitrary_scale_but_orderable_within_event
  tie_break_rule: stable_candidate_order_after_score_descending
  candidate_order_as_score_allowed: false
fairness_policy:
  policy_id: official_code_qwen3base_default_hparams_declared_adaptation_v1
  policy_version: 2026-05-08
  name: standardized_backbone_default_baseline_hyperparameters
  primary_table_variant: official_code_qwen3base_default_hparams_declared_adaptation
  summary: >
    Main external-baseline comparisons use each method's official code or
    official-code-level implementation, adapt only the data interface and
    LLM/text backbone, and standardize the base model to Qwen3-8B.
    LoRA, official adapters, full fine-tuning checkpoints, or representation
    learners are declared per table and retained only when they are part of the
    compared baseline's official algorithm or the declared experiment variant.
    Baselines use their official default or recommended hyperparameters unless
    a paper-specific setting is required to consume the unified protocol. Our
    framework may select its own gates, weights, and hyperparameters on
    validation only. The experiment-wide adaptation mode is declared for every
    table; LoRA and full fine-tuning rows are not silently mixed.
  baseline_hyperparameter_policy: official_default_or_recommended
  our_hyperparameter_policy: validation_selected_or_fixed_before_test
  official_code_required: true
  unified_backbone_required: true
  unified_backbone_family: Qwen3-8B
  unified_backbone_path: /home/ajifang/models/Qwen/Qwen3-8B
  baseline_extra_tuning_allowed_in_primary_table: false
  validation_only_model_selection: true
  test_set_model_selection_allowed: false
  import_full_catalog_metrics_allowed: false
  score_schema:
    - source_event_id
    - user_id
    - item_id
    - score
  tuning_budget_policy: >
    The primary table does not tune every baseline to a new optimum on our
    split. If baseline retuning is performed, report it as a stronger
    sensitivity or robustness variant with provenance.
  finetuning_policy:
    primary: declared_experiment_wide_adaptation_mode
    primary_table_base_model_update_policy: frozen_base_except_method_declared_adapter_or_representation_module
    full_finetune_allowed: optional_separate_variant_only
    no_mixed_lora_full_finetune_main_table: true
  allowed_comparison_variants:
    - official_code_original_backbone_default_hparams_supplementary
    - official_code_qwen3base_default_hparams_declared_adaptation
    - official_code_qwen3_8b_full_finetune_default_hparams_supplementary
    - official_code_qwen3base_retuned_baselines_sensitivity
  required_setting_fields:
    - fairness_policy_id
    - comparison_variant
    - comparison_tier
    - backbone_model_family
    - backbone_model_path
    - llm_adaptation_mode
    - baseline_hyperparameter_source
    - baseline_hyperparameter_overrides
    - our_hyperparameter_selection_rule
    - validation_selection_metric
    - test_selection_forbidden
    - score_schema
  required_fairness_provenance:
    - fairness_policy_id
    - comparison_variant
    - comparison_tier
    - official_code_required
    - official_repo
    - official_repo_commit
    - official_entrypoint
    - baseline_hyperparameter_source
    - baseline_hyperparameter_overrides
    - baseline_extra_tuning_allowed
    - backbone_model_family
    - backbone_model_path
    - llm_adaptation_mode
    - adapter_or_checkpoint_path
    - trainable_parameter_count
    - total_parameter_count
    - validation_selection_metric
    - test_set_model_selection_allowed
    - same_candidate_task_sources
    - score_output_path
    - score_schema
    - score_coverage_rate
unified_protocol:
  train_source: outputs/baselines/external_tasks/<exp_prefix>_test_same_candidate/train_interactions.csv
  valid_source: outputs/baselines/external_tasks/<exp_prefix>_valid_same_candidate/ranking_valid.jsonl
  test_source: outputs/baselines/external_tasks/<exp_prefix>_test_same_candidate/ranking_test.jsonl
  candidate_source: outputs/baselines/external_tasks/<exp_prefix>_test_same_candidate/candidate_items.csv
  metric_importer: main_import_same_candidate_baseline_scores.py
  metrics:
    - HR@10
    - NDCG@10
    - MRR
    - coverage@10
    - head_exposure_ratio@10
    - longtail_coverage@10
backbone_policy:
  name: Unified Qwen3-8B base with declared per-baseline adaptation mode
  base_model_path: /home/ajifang/models/Qwen/Qwen3-8B
  base_model_family: Qwen3-8B
  base_model_update_policy: frozen_base_except_method_declared_adapter_or_representation_module
  adapter_policy: train_and_retain_per_official_algorithm
  replacement_rule: >
    Whenever the official baseline uses an LLM/text encoder or LLM-derived
    representation source, use the same Qwen3-8B base model. Train, load, and
    retain LoRA/adapters, full-finetune checkpoints, or downstream artifacts according to that baseline's
    official algorithm. Preserve the recommender architecture, training
    objective, and scoring module unless a change is required to consume the
    unified same-candidate protocol.
  score_rule: >
    Full-catalog metrics from the official repository are not imported. Every
    baseline must emit exact candidate scores using the shared schema, then use
    the unified importer and paired tests.
  required_adapter_checkpoint_provenance:
    - comparison_variant
    - base_model_path
    - llm_adaptation_mode
    - baseline_hyperparameter_source
    - baseline_hyperparameter_overrides
    - validation_selection_metric
    - official_repo
    - official_repo_commit
    - local_repo_env
    - resolved_local_repo_path
    - official_training_or_adaptation_entrypoint
    - adapter_or_checkpoint_path
    - adapter_or_checkpoint_commit_or_digest
    - adapter_or_checkpoint_training_inputs
    - adapter_or_checkpoint_hyperparameters
    - adapter_or_checkpoint_created_at
    - same_candidate_task_sources
    - score_output_path

