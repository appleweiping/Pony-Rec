protocol_name: week8_official_external_same_candidate_qwen3_lora
status: implementation_contract
output_score_schema:
  - source_event_id
  - user_id
  - item_id
  - score
unified_protocol:
  train_source: outputs/baselines/external_tasks/<exp_prefix>_test_same_candidate/train_interactions.csv
  valid_source: outputs/baselines/external_tasks/<exp_prefix>_valid_same_candidate/ranking_valid.jsonl
  test_source: outputs/baselines/external_tasks/<exp_prefix>_test_same_candidate/ranking_test.jsonl
  candidate_source: outputs/baselines/external_tasks/<exp_prefix>_test_same_candidate/candidate_items.csv
  metric_importer: main_import_same_candidate_baseline_scores.py
  metrics:
    - HR@10
    - NDCG@10
    - MRR
    - coverage@10
    - head_exposure_ratio@10
    - longtail_coverage@10
backbone_policy:
  name: Unified Qwen3-8B base with official per-baseline LoRA/adapter
  base_model_path: /home/ajifang/models/Qwen/Qwen3-8B
  base_model_family: Qwen3-8B
  adapter_policy: train_and_retain_per_official_algorithm
  replacement_rule: >
    Whenever the official baseline uses an LLM/text encoder or LLM-derived
    representation source, use the same Qwen3-8B base model. Train, load, and
    retain LoRA/adapters or downstream checkpoints according to that baseline's
    official algorithm. Preserve the recommender architecture, training
    objective, and scoring module unless a change is required to consume the
    unified same-candidate protocol.
  score_rule: >
    Full-catalog metrics from the official repository are not imported. Every
    baseline must emit exact candidate scores using the shared schema, then use
    the unified importer and paired tests.
  required_adapter_checkpoint_provenance:
    - base_model_path
    - official_repo
    - official_repo_commit
    - local_repo_env
    - resolved_local_repo_path
    - official_training_or_adaptation_entrypoint
    - adapter_or_checkpoint_path
    - adapter_or_checkpoint_commit_or_digest
    - adapter_or_checkpoint_training_inputs
    - adapter_or_checkpoint_hyperparameters
    - adapter_or_checkpoint_created_at
    - same_candidate_task_sources
    - score_output_path

official_baselines:
  llm2rec:
    paper_style_name: LLM2Rec-style Qwen3-8B Emb. + SASRec
    target_baseline_name: llm2rec_official_qwen3_lora_sasrec
    official_repo: https://github.com/HappyPointer/LLM2Rec
    pinned_commit: 73b481f710f67166ab958f4985d27b27fb410871
    local_repo_env: LLM2REC_REPO_DIR
    local_repo_default: /home/ajifang/projects/LLM2Rec
    official_code_provenance:
      repo_url: https://github.com/HappyPointer/LLM2Rec
      repo_path: HappyPointer/LLM2Rec
      commit: 73b481f710f67166ab958f4985d27b27fb410871
      local_checkout_env: LLM2REC_REPO_DIR
      local_checkout_default: /home/ajifang/projects/LLM2Rec
    adapter_checkpoint_provenance:
      record_required: true
      adapter_or_checkpoint_kind: official_llm2rec_sasrec_checkpoint
      path_record: produced_checkpoint_path_per_domain
      digest_record: produced_checkpoint_digest_per_domain
      training_entrypoint_record: official_or_wrapped_llm2rec_training_entrypoint
      training_inputs_record:
        - unified train_source
        - unified valid_source
        - Qwen3-8B item/text representation artifacts
      hyperparameter_record: official_llm2rec_sasrec_hyperparameters
    official_code_adaptation_notes:
      - keep LLM2Rec seqrec SASRec classes and loss path authoritative
      - adapt only data installation, Qwen3-8B representation generation, and candidate-score export
      - record any wrapper script that bridges same-candidate data into official data/<dataset_alias>
    current_status: partial_official_adapter_exists
    existing_local_scripts:
      - main_export_llm2rec_same_candidate_task.py
      - main_prepare_llm2rec_upstream_adapter.py
      - main_generate_llm2rec_sentence_embeddings.py
      - main_score_llm2rec_same_candidate_adapter.py
    official_modules_to_preserve:
      - seqrec SASRec model implementation
      - seqrec training/evaluation objective
      - item embedding input contract
    required_protocol_changes:
      - install same-candidate data under LLM2Rec data/<dataset_alias>
      - use unified Qwen3-8B base for item text representations
      - export exact same-candidate scores instead of official full-catalog metrics
    remaining_work:
      - pin local checkout to pinned_commit
      - record produced checkpoint path per domain
      - verify same-candidate score coverage equals 1.0

