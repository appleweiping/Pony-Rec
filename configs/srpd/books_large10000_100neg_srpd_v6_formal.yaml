run_name: books_large10000_100neg_srpd_v6_formal
domain: books
task: candidate_ranking
srpd_stage: v6
method_variant: SRPD-v6_formal_gap_gated_preference_sft

formal_policy:
  enabled: true
  require_train_valid_teacher: true
  forbid_test_teacher_paths: true
  require_leakage_audit: true
  default_status_label: same_schema_internal_ablation

base_input_path: outputs/baselines/external_tasks/books_large10000_100neg_valid_same_candidate/ranking_valid.jsonl
structured_risk_teacher_path: outputs/summary/week8_srpd_formal_teachers/books/valid_teacher_rank_reranked.jsonl
train_ratio: 0.8

leakage_audit:
  eval_input_path: outputs/baselines/external_tasks/books_large10000_100neg_test_same_candidate/ranking_test.jsonl
  forbidden_event_path: outputs/baselines/external_tasks/books_large10000_100neg_test_same_candidate/ranking_test.jsonl
  allow_overlap: false

weighting:
  base: 1.0
  disagreement_bonus: 0.15
  uncertainty_scale: 0.35
  risk_scale: 0.05
  min_weight: 0.85
  max_weight: 1.6
  gate:
    mode: teacher_gap_or_uncertainty
    fallback_weight: 1.0
    gate_boost: 0.05
    min_effective_uncertainty: 0.15
    min_risk_weight: 0.05

preference_training:
  enabled: true
  require_gap_or_uncertainty: true
  max_pairs_per_event: 4
  teacher_topn: 4
  min_score_gap: 0.0
  min_effective_uncertainty: 0.15
  min_risk_weight: 0.05
  include_positive_gain_pair: true
  include_teacher_order_pairs: true
  base_pair_weight: 1.0

output_train_path: outputs/summary/week8_srpd_formal_data/books/train.jsonl
output_valid_path: outputs/summary/week8_srpd_formal_data/books/valid.jsonl
summary_path: outputs/summary/week8_srpd_formal/books_data_summary.csv
leakage_audit_path: outputs/summary/week8_srpd_formal/books_leakage_audit.json
markdown_path: outputs/summary/week8_srpd_formal/books_data_summary.md

notes: >
  Formal Books SRPD-v6 template. It intentionally trains only from the large
  100neg validation-side teacher pool and blocks test-derived teacher paths.
  Final test events are used only through eval_input_path and leakage audit.
