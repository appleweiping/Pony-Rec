dataset: amazon_books
domain: Books
seed: 42
raw:
  format: amazon
  review_path: data/raw/amazon_books/Books.jsonl.gz
  meta_path: data/raw/amazon_books/meta_Books.jsonl.gz
processed_dir: data/processed/amazon_books
filter:
  rating_threshold: 4.0
  k_core: 5
split:
  method: temporal_leave_one_out
  min_sequence_length: 5
candidates:
  negative_count: 99
  strategy: popularity_stratified
popularity:
  head_ratio: 0.2
  mid_ratio: 0.6
