status_label: same_schema_external_baseline
task: candidate_ranking
prediction_schema: rank_predictions_jsonl
metrics:
  - HR@10
  - NDCG@10
  - MRR
  - coverage@10
  - head_exposure_ratio@10
  - longtail_coverage@10
required_protocol:
  train_split_only: true
  score_exact_candidate_item_ids: true
  reuse_existing_ranking_eval_code: true
  run_candidate_protocol_audit: true
  run_paired_significance_tests_before_winner_claim: true

classical_same_candidate:
  - baseline_name: sasrec
    priority: A
    implementation_status: lightweight_torch_trainer_ready
    adapter_kind: sequential_recommender
    first_domain: beauty
    train_script: main_train_sasrec_same_candidate.py
    notes: Four-domain same-candidate completed result available; lightweight PyTorch trainer is available before paper-specific methods.
  - baseline_name: bert4rec
    priority: A
    implementation_status: lightweight_torch_trainer_ready
    adapter_kind: bidirectional_sequential_recommender
    first_domain: beauty
    train_script: main_train_bert4rec_same_candidate.py
    notes: Four-domain same-candidate completed result available; standard masked-item sequential baseline.
  - baseline_name: gru4rec
    priority: A
    implementation_status: lightweight_torch_trainer_ready
    adapter_kind: recurrent_sequential_recommender
    first_domain: beauty
    train_script: main_train_gru4rec_same_candidate.py
    notes: Four-domain same-candidate completed result available; lightweight recurrent sanity baseline.
  - baseline_name: lightgcn
    priority: A_or_B
    implementation_status: lightweight_torch_trainer_ready
    adapter_kind: graph_collaborative_filtering
    first_domain: beauty
    train_script: main_train_lightgcn_same_candidate.py
    notes: Four-domain same-candidate completed result available; lightweight graph collaborative-filtering baseline.

adapter_entrypoints:
  export_task:
    script: main_export_same_candidate_baseline_task.py
    output_files:
      - train_interactions.csv
      - candidate_items.csv
      - recbole/<dataset>.inter
      - metadata.json
  import_scores:
    script: main_import_same_candidate_baseline_scores.py
    required_score_columns:
      - source_event_id
      - user_id
      - item_id
      - score
    output_files:
      - predictions/rank_predictions.jsonl
      - tables/ranking_metrics.csv
      - tables/ranking_exposure_distribution.csv
      - tables/same_candidate_external_baseline_summary.csv
  sasrec_train:
    script: main_train_sasrec_same_candidate.py
    output_files:
      - sasrec_scores.csv
      - sasrec_train_summary.csv
      - sasrec_epoch_log.csv
      - sasrec_model_metadata.json
  gru4rec_train:
    script: main_train_gru4rec_same_candidate.py
    output_files:
      - gru4rec_scores.csv
      - gru4rec_train_summary.csv
      - gru4rec_epoch_log.csv
      - gru4rec_model_metadata.json
  bert4rec_train:
    script: main_train_bert4rec_same_candidate.py
    output_files:
      - bert4rec_scores.csv
      - bert4rec_train_summary.csv
      - bert4rec_epoch_log.csv
      - bert4rec_model_metadata.json
  lightgcn_train:
    script: main_train_lightgcn_same_candidate.py
    output_files:
      - lightgcn_scores.csv
      - lightgcn_train_summary.csv
      - lightgcn_epoch_log.csv
      - lightgcn_model_metadata.json
  llmesr_adapter_export:
    script: main_export_llmesr_same_candidate_task.py
    status: adapter_package_only
    output_files:
      - llm_esr/handled/inter.txt
      - llm_esr/handled/sim_user_100.pkl
      - candidate_items_mapped.csv
      - item_text_seed.csv
      - user_id_map.csv
      - item_id_map.csv
      - adapter_metadata.json
  llmesr_adapter_audit:
    script: main_audit_llmesr_adapter_package.py
    status: adapter_package_audit
    output_files:
      - adapter_audit.csv
  llmesr_text_embedding_scaffold:
    script: main_generate_llmesr_text_embeddings.py
    status: adapter_scaffold_embedding
    output_files:
      - llm_esr/handled/itm_emb_np.pkl
      - llm_esr/handled/pca64_itm_emb_np.pkl
      - llmesr_embedding_metadata.json
  llmesr_scaffold_scorer:
    script: main_score_llmesr_same_candidate_adapter.py
    status: adapter_scaffold_score
    output_files:
      - llmesr_scaffold_scores.csv
      - llmesr_scaffold_score_summary.csv
      - llmesr_scaffold_score_metadata.json
  llmesr_four_domain_scaffold_runner:
    script: main_run_llmesr_scaffold_four_domain.py
    status: four_domain_adapter_scaffold_score
    output_files:
      - outputs/summary/llmesr_scaffold_four_domain_summary.csv

paper_adapter_candidates:
  - method_name: LLM-ESR
    source_collection: NH
    priority: B1_first_adapter_target
    repo_url: https://github.com/Applied-Machine-Learning-Lab/LLM-ESR
    adapter_entrypoint: main_export_llmesr_same_candidate_task.py
    status: adapter_package_export_ready
    notes: Long-tail sequential recommendation; first paper-project target because it has item-level predict methods and directly supports the long-tail/exposure story. Requires LLM-compatible item embeddings before completed_result.
  - method_name: LLM2Rec
    source_collection: NR
    priority: B2_backup_adapter_target
    repo_url: https://github.com/HappyPointer/LLM2Rec
    status: inspected_embedding_pipeline
    notes: Embedding-model sequential recommendation; feasible if precomputed item/sequence embeddings are available, but dependency chain is heavier than LLM-ESR.
  - method_name: OpenP5
    source_collection: NH
    priority: C_platform_reference
    repo_url: https://github.com/agiresearch/OpenP5
    status: inspected_platform_heavy
    notes: Open LLM-rec platform; useful reference but not first adapter because native pipeline needs platform dataset generation/checkpoints.
  - method_name: SLMRec
    source_collection: NH
    priority: C_heavy_training_chain
    repo_url: https://github.com/WujiangXu/SLMRec
    status: inspected_teacher_student_heavy
    notes: Sequential LLM distillation baseline with code detected; requires teacher/student distillation resources before same-candidate scoring.
  - method_name: LLMEmb
    source_collection: NH
    priority: B_adapter_candidate
    notes: LLM embedding generator for sequential recommendation.
  - method_name: RLMRec
    source_collection: NR
    priority: B3_graph_embedding_candidate
    repo_url: https://github.com/HKUDS/RLMRec
    status: inspected_graph_embedding_pipeline
    notes: Representation-learning baseline; graph/text-embedding format is feasible but should follow LLM-ESR/LLM2Rec.
  - method_name: IRLLRec
    source_collection: NR
    priority: B3_graph_embedding_candidate
    repo_url: https://github.com/wangyu0627/IRLLRec
    status: inspected_graph_embedding_pipeline
    notes: Intent representation learning baseline; adapted from RLMRec-style graph/text embeddings and should follow LLM-ESR/LLM2Rec.
  - method_name: SETRec
    source_collection: NR
    priority: B_adapter_candidate
    notes: Generative recommendation identifier baseline.
  - method_name: Uncertainty Quantification and Decomposition for LLM-based Recommendation
    source_collection: NR
    priority: B_diagnostic_reference
    notes: Closest uncertainty-specific paper; first audit outputs, then decide whether it can rank candidates.
